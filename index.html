<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RAP GOAT TOURNAMENT</title>
<style>
body { font-family: Arial, sans-serif; background:#0b0b0b; color:#fff; text-align:center; }
.container { max-width:900px; margin:auto; padding:20px; }
.album { margin-bottom:40px; }
img { width:200px; border-radius:10px; }
.track { display:block; margin:5px auto; padding:10px; background:#1a1a1a; border-radius:5px; cursor:pointer; }
.track:hover { background:#f39c12; color:#000; }
.selected { background:#2ecc71 !important; color:#000; }
button { padding:10px 20px; margin-top:20px; cursor:pointer; }
</style>
</head>
<body>
<div class="container">
<h1>🎧 Elegí el mejor tema por álbum</h1>
<div id="app"></div>
</div>

<script>
const data = [
{
name:"Eminem",
album:"The Eminem Show",
cover:"https://upload.wikimedia.org/wikipedia/en/3/35/The_Eminem_Show.jpg",
tracks:["Without Me","Till I Collapse","Sing for the Moment","Cleanin' Out My Closet"]
},
{
name:"WOS",
album:"Oscuro Éxtasis",
cover:"https://upload.wikimedia.org/wikipedia/en/7/7e/Oscuro_Extasis.jpg",
tracks:["Arrancármelo","Culpa","Mugre","Que se mejoren"]
},
{
name:"Tupac",
album:"All Eyez on Me",
cover:"https://upload.wikimedia.org/wikipedia/en/1/16/All_Eyez_on_Me.jpg",
tracks:["California Love","Ambitionz Az a Ridah","Life Goes On","I Ain't Mad at Cha"]
},
{
name:"Trueno",
album:"Bien o Mal",
cover:"https://upload.wikimedia.org/wikipedia/en/5/5f/Bien_o_Mal.jpg",
tracks:["Dance Crip","Mamichula","Argentina","Tierra Zanta"]
}
];

let selections = {};

function render(){
let html = "";

data.forEach((a,i)=>{
html += `
<div class='album'>
<h2>${a.name}</h2>
<h3>${a.album}</h3>
<img src='${a.cover}' />
<div>
${a.tracks.map(t=>`<div class='track' onclick="select(${i},'${t}', this)">${t}</div>`).join("")}
</div>
</div>
`;
});

html += `<button onclick='showResults()'>Ver resultados</button>`;

document.getElementById("app").innerHTML = html;
}

function select(index, track, el){
selections[index] = track;

let tracks = el.parentNode.querySelectorAll('.track');
tracks.forEach(t=>t.classList.remove('selected'));

el.classList.add('selected');
}

function showResults(){
let html = "<h2>🏆 Tus elecciones</h2>";

data.forEach((a,i)=>{
if(selections[i]){
html += `<p>${a.name} - ${selections[i]}</p>`;
}
});

html += `<button onclick='startTournament()'>Ir al torneo</button>`;

document.getElementById("app").innerHTML = html;
}

function startTournament(){
let players = data.map((a,i)=>({ artist:a.name, track:selections[i] })).filter(p=>p.track);

if(players.length < 2){
alert("Elegí al menos 2 artistas");
return;
}

runBracket(players);
}

function runBracket(players){
if(players.length === 1){
document.getElementById("app").innerHTML = `<h1>🏆 GANADOR: ${players[0].artist} - ${players[0].track}</h1>`;
return;
}

let html = "<h2>🔥 Duelo</h2>";

for(let i=0;i<players.length;i+=2){
let a = players[i];
let b = players[i+1];

if(!b){ html += `<p>${a.artist} pasa</p>`; continue; }

html += `
<div>
<button onclick='nextRound(${i})'>${a.artist}<br>${a.track}</button>
<button onclick='nextRound(${i+1})'>${b.artist}<br>${b.track}</button>
</div>
`;
}

window.currentPlayers = players;
document.getElementById("app").innerHTML = html;
}

function nextRound(index){
let winners = [window.currentPlayers[index]];

for(let i=0;i<window.currentPlayers.length;i+=2){
if(i!==index && i!==index-1){
if(window.currentPlayers[i+1]) winners.push(window.currentPlayers[i]);
}
}

runBracket(winners);
}

render();
</script>
</body>
</html>
